name: prf-ai-pipeline

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prf}
      POSTGRES_DB: ${POSTGRES_DB:-prf_ai_pipeline}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prf} -d ${POSTGRES_DB:-prf_ai_pipeline}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-crm:
    build: ./backend
    command: ["python", "-m", "app.mcp_servers.crm.server"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prf}:${POSTGRES_PASSWORD:-prf}@postgres:5432/${POSTGRES_DB:-prf_ai_pipeline}
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8100), 2)"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-address:
    build: ./backend
    command: ["python", "-m", "app.mcp_servers.address.server"]
    ports:
      - "8101:8101"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8101), 2)"]
      interval: 5s
      timeout: 5s
      retries: 10

  celery-worker:
    build: ./backend
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prf}:${POSTGRES_PASSWORD:-prf}@postgres:5432/${POSTGRES_DB:-prf_ai_pipeline}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-prf}:${POSTGRES_PASSWORD:-prf}@postgres:5432/${POSTGRES_DB:-prf_ai_pipeline}
      CHECKPOINTER_DATABASE_URL: postgresql://${POSTGRES_USER:-prf}:${POSTGRES_PASSWORD:-prf}@postgres:5432/${POSTGRES_DB:-prf_ai_pipeline}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MCP_CRM_URL: http://mcp-crm:8100/mcp
      MCP_ADDRESS_URL: http://mcp-address:8101/mcp
      LLM_PROVIDER: ${LLM_PROVIDER:-google_genai}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      JUDGE_PROVIDER: ${JUDGE_PROVIDER:-google_genai}
      JUDGE_MODEL: ${JUDGE_MODEL:-gemini-2.5-flash-lite}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-crm:
        condition: service_healthy
      mcp-address:
        condition: service_healthy

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prf}:${POSTGRES_PASSWORD:-prf}@postgres:5432/${POSTGRES_DB:-prf_ai_pipeline}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-prf}:${POSTGRES_PASSWORD:-prf}@postgres:5432/${POSTGRES_DB:-prf_ai_pipeline}
      CHECKPOINTER_DATABASE_URL: postgresql://${POSTGRES_USER:-prf}:${POSTGRES_PASSWORD:-prf}@postgres:5432/${POSTGRES_DB:-prf_ai_pipeline}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MCP_CRM_URL: http://mcp-crm:8100/mcp
      MCP_ADDRESS_URL: http://mcp-address:8101/mcp
      LLM_PROVIDER: ${LLM_PROVIDER:-google_genai}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      JUDGE_PROVIDER: ${JUDGE_PROVIDER:-google_genai}
      JUDGE_MODEL: ${JUDGE_MODEL:-gemini-2.5-flash-lite}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-crm:
        condition: service_healthy
      mcp-address:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
